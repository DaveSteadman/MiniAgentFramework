<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniAgentFramework</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>🤖</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="layout">

    <!-- ================================================
         HEADER
         ================================================ -->
    <header id="header">
        <div class="brand"><span class="brand-pre">MINI</span><span class="brand-accent">AGENT</span><span class="brand-post">FRAMEWORK</span></div>
        <div id="ollama-dot" class="off"></div>
        <div id="ollama-info">
            <span id="ollama-host" class="info-chip"></span>
            <span class="info-sep">|</span>
            <span id="ollama-model" class="info-chip"></span>
            <span class="info-sep">|</span>
            <span id="ollama-ctx" class="info-chip"></span>
        </div>
        <div class="sep"></div>
        <button class="wrap-btn" id="btn-reset-layout" onclick="resetLayout()">default layout</button>
        <div id="version-chip"></div>
    </header>

    <!-- ================================================
         MAIN GRID
         ================================================ -->
    <div id="main-grid">

        <!-- Timeline -->
        <div class="panel" id="panel-timeline">
            <div class="panel-header">
                <div class="dot"></div>
                Schedule
            </div>
            <div id="timeline-ticker"></div>
            <div id="timeline-queue"></div>
        </div>

        <div class="splitter splitter-v" id="splitter-v1"></div>

        <!-- Log stream -->
        <div class="panel" id="panel-log">
            <div class="panel-header">
                <div class="dot"></div>
                <span id="log-panel-title">Log</span>
                <span class="header-spacer"></span>
                <button class="wrap-btn" id="log-btn-up"   onclick="logNavStep(-1)">&#x2191;</button>
                <button class="wrap-btn" id="log-btn-down" onclick="logNavStep(+1)">&#x2193;</button>
                <button class="wrap-btn wrap-active" id="log-btn-live" onclick="toggleLogLive()">live</button>
                <button class="wrap-btn" id="wrap-btn-log" onclick="toggleWrap('log-body','wrap-btn-log')">wrap</button>
            </div>
            <div class="panel-body nowrap" id="log-body"></div>
        </div>

        <div class="splitter splitter-v" id="splitter-v2"></div>

        <!-- Chat -->
        <div class="panel" id="panel-chat">
            <div class="panel-header">
                <div class="dot"></div>
                Chat
                <span class="header-spacer"></span>
                <button class="wrap-btn" id="sandbox-btn" onclick="toggleSandbox()">sandbox</button>
                <button class="wrap-btn" id="wrap-btn-chat" onclick="toggleWrap('chat-body','wrap-btn-chat')">wrap</button>
            </div>
            <div class="panel-body nowrap" id="chat-body"></div>
        </div>

        <div class="splitter splitter-h" id="splitter-h1"></div>

        <!-- Input bar -->
        <div class="panel" id="panel-input">
            <div class="panel-body">
                <textarea
                    id="chat-input"
                    rows="3"
                    placeholder="Type a prompt and press Enter (Shift+Enter for newline)..."
                    autocomplete="off"
                    spellcheck="false"
                ></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>

    </div><!-- #main-grid -->
</div><!-- #layout -->

<script src="/static/app.js?v=11"></script>
</body>
</html>
